<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tech Tree Planner</title>
    <link rel="icon" type="image/png" href="icons/app-icon.png">
    <link rel="stylesheet" href="css/desktop.css">
    <link rel="stylesheet" href="css/desktop2.css">
    <link rel="stylesheet" href="css/desktop3.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/mobile2.css">
    <link rel="stylesheet" href="css/modal.css">
    <style>
        /* INLINE STYLES FOR BUTTON ACTIVE STATES */
        .seg-btn.active::before {
            width: 110% !important; height: 120% !important; top: 50% !important; left: 50% !important;
            transform: translate(-50%, -50%) !important; border-radius: 8px !important;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3) !important; z-index: -1;
        }
        .seg-btn.active {
            z-index: 50; overflow: visible; font-size: 1.05rem !important; transition: font-size 0.1s ease;
        }
        .tree-seg-btn {
            flex: 1; height: 100%; position: relative; background: transparent; border: none;
            border-right: 1.5px solid #000000; margin: 0; cursor: pointer; color: #ffffff;
            font-family: 'Fredoka One', 'Fredoka', sans-serif; font-size: 0.9rem;
            -webkit-text-stroke: 2px #000000; paint-order: stroke fill;
            display: flex; align-items: center; justify-content: center; gap: 8px; z-index: 1;
            transition: all 0.1s ease;
        }
        .tree-seg-btn:last-child { border-right: none; }
        .tree-seg-btn img { height: 20px; width: auto; filter: drop-shadow(0 1px 0 #000); transition: transform 0.1s ease; }
        .tree-seg-btn.active { z-index: 50; border-right-color: transparent; overflow: visible; font-size: 1.05rem !important; }
        .tree-seg-btn.active img { transform: scale(1.2); }
        .tree-seg-btn.active::before {
            content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 110%; height: 120%; border: 2px solid #000000; border-radius: 8px;
            box-shadow: none !important; z-index: -1;
        }
        .tree-seg-btn.forge.active::before { background-color: #5eff8b; }
        .tree-seg-btn.spt.active::before   { background-color: #fcfe5d; }
        .tree-seg-btn.power.active::before { background-color: #ff5d5e; }
    </style>
</head>
<body class="view-planner">

    <input type="file" id="file-upload" style="display:none" onchange="uploadData(this)" accept=".json">

    <div id="mobile-tree-nav" class="mobile-only tree-sticky-nav">
        <div class="tn-row-1" style="justify-content: center !important;">
            <div class="segmented-control" style="margin: 0; width: 200px; height: 32px;">
                <button class="seg-btn active" id="btn-setup-mobile-new" onclick="setMode('setup')">SETUP</button>
                <button class="seg-btn" id="btn-plan-mobile-new" onclick="setMode('plan')">PLAN</button>
            </div>
        </div>
        <div class="tn-row-2" style="padding: 5px 10px !important; margin-top: 10px !important;">
            <div class="segmented-control" style="margin: 0 10px; width: 100%; height: 32px;">
                <button class="tree-seg-btn forge active" id="mtab-forge" onclick="selectTree('forge')"><img src="icons/tree_forge.png"> FORGE</button>
                <button class="tree-seg-btn spt" id="mtab-spt" onclick="selectTree('spt')"><img src="icons/tree_SPT.png"> SPT</button>
                <button class="tree-seg-btn power" id="mtab-power" onclick="selectTree('power')"><img src="icons/tree_power.png"> POWER</button>
            </div>
        </div>
    </div>

    <div class="desktop-workspace">
        
        <div class="pane dashboard-pane desktop-only">
            
            <div class="floating-header-container" style="position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%); width: max-content; z-index: 500;">
                <div class="fhc-circle">
                    <span>
                        <img src="icons/Doraemon.png" alt="Icon" style="width: 110% !important; height: 110% !important; object-fit: contain;">
                    </span>
                </div>
                <div class="fhc-pill" style="justify-content: center;">
                    <span style="white-space: nowrap;">TECH PLANNER</span>
                </div>
            </div>

            <div class="dashboard-scroll-wrapper">
                <div class="tools-group-box">
                    <button class="mode-btn dash-btn" id="btn-logs" onclick="setSidebarPanel('logs')">
                        <img src="icons/icon_timeline.png" class="dash-icon"> Schedule
                    </button>
                    <button class="mode-btn dash-btn" id="btn-stats" onclick="setSidebarPanel('stats')">
                        <img src="icons/icon_stats.png" class="dash-icon"> Stats
                    </button>
                    <button class="mode-btn dash-btn" id="btn-calc" onclick="setSidebarPanel('calc')">
                        <img src="icons/anvil.png" class="dash-icon"> Forge Calc
                    </button>
                    <button class="mode-btn dash-btn" id="btn-daily" onclick="setSidebarPanel('daily')">
                        <img src="icons/icon_daily.png" class="dash-icon"> Daily Gain
                    </button>
                    <button class="mode-btn dash-btn" id="btn-egg" onclick="setSidebarPanel('egg')">
                        <img src="icons/icon_eggplan.png" class="dash-icon"> Egg Planner
                    </button>
                </div>
            </div>
            <div class="control-capsule dashboard-capsule bottom-capsule">
                <button class="sys-btn" onclick="downloadData()" title="Save Data">
                    <img src="icons/icon_save.png" class="sys-icon">
                </button>
                <button class="sys-btn" onclick="document.getElementById('file-upload').click()" title="Load Data">
                    <img src="icons/icon_load.png" class="sys-icon">
                </button>
                <button class="sys-btn" onclick="toggleHelp()" title="Help">
                    <img src="icons/icon_help.png" class="sys-icon" onerror="this.style.display='none';this.parentNode.innerHTML='❓'">
                </button>
            </div>
        </div>

        <div class="workspace-card">
            
            <div class="pane left-pane"> 
                <div class="new-header-container desktop-only">
                    <div class="new-mode-switch">
                        <button class="seg-btn active" id="btn-setup" onclick="setMode('setup')">SETUP</button>
                        <button class="seg-btn" id="btn-plan" onclick="setMode('plan')">PLAN</button>
                    </div>
                </div>

                <div class="d-header-row row-tabs desktop-only" style="margin-top: 10px;">
                    <div class="segmented-control" style="margin: 0; width: 400px; height: 40px;">
                        <button class="tree-seg-btn forge active" id="tab-forge" onclick="selectTree('forge')"><img src="icons/tree_forge.png"> FORGE</button>
                        <button class="tree-seg-btn spt" id="tab-spt" onclick="selectTree('spt')"><img src="icons/tree_SPT.png"> SPT</button>
                        <button class="tree-seg-btn power" id="tab-power" onclick="selectTree('power')"><img src="icons/tree_power.png"> POWER</button>
                    </div>
                </div>

                <div class="tree-container" id="tree-container">
                    <div class="tree-canvas" id="canvas">
                        <svg class="connections-layer" id="svg-layer"></svg>
                        <div class="physical-spacer"></div>
                    </div>
                </div>

                <div class="control-capsule bottom-capsule desktop-only">
                    <button class="btn-reset-text" onclick="resetCurrentTree()" title="Reset Tree"></button>
                    <button id="btn-undo-desktop" onclick="undo()" disabled title="Undo"></button>
                    <button id="btn-redo-desktop" onclick="redo()" disabled title="Redo"></button>
                </div>
            </div>

            <div class="pane right-pane-wrapper">
                
                <div class="floating-header-container">
                    <div class="fhc-circle"><span id="fh-icon">📜</span></div>
                    <div class="fhc-pill"><span id="fh-title">SCHEDULE</span></div>
                </div>

                <div class="pane-visual">
                    <div class="sidebar-scroll-wrapper">
                        
                        <div id="panel-logs" class="sidebar-panel">
                            <div class="log-container">
                                
                                <div class="config-card">
                                    <div class="war-setup-row">
                                        <label class="drs-label">War Start:</label>
                                        <div class="war-select-group">
                                            <select id="war-day" class="war-select" onchange="updateWarConfig()"><option value="1">Mon</option><option value="2" selected>Tue</option></select>
                                            <select id="war-hour" class="war-select" onchange="updateWarConfig()">
                                                <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option>
                                                <option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option>
                                                <option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12" selected>12</option>
                                            </select>
                                            <select id="war-ampm" class="war-select" onchange="updateWarConfig()"><option value="AM" selected>AM</option><option value="PM">PM</option></select>
                                        </div>
                                    </div>

                                    <div class="date-row-styled">
                                        <label class="drs-label">Start:</label>
                                        <input type="datetime-local" id="start-date" class="drs-input desktop-only" lang="en-GB" onchange="updateCalculations(); safeSyncDropdowns(this.value, 'dm')">
                                        <div id="mobile-custom-date" class="mobile-only custom-date-group">
                                            <select id="dm-month" class="cd-select cd-month" onchange="updateFromDropdowns()"></select>
                                            <select id="dm-day" class="cd-select cd-day" onchange="updateFromDropdowns()"></select>
                                            <select id="dm-hour" class="cd-select cd-time" onchange="updateFromDropdowns()"></select>
                                            <span class="cd-sep">:</span>
                                            <select id="dm-min" class="cd-select cd-time" onchange="updateFromDropdowns()"></select>
                                        </div>
                                    </div>
                                </div>

                                <div class="stats-box-row">
                                    <div class="sb-item type-res"><span class="sb-value" style="color:#e74c3c" id="res-val-desktop">0</span></div>
                                    <div class="sb-item type-time"><span class="sb-value" style="color:#f39c12" id="time-val-desktop">0m</span></div>
                                </div>

                                <div id="log-list"></div>
                                <div class="physical-spacer" style="height: 60px;"></div>
                            </div>
                        </div>

                        <div id="panel-stats" class="sidebar-panel" style="display:none;">
                            <div class="stats-container" id="stats-container">
                                <div id="stats-content"></div> 
                            </div>
                        </div>

                        <div id="panel-calc" class="sidebar-panel" style="display:none;">
                            <div class="calc-container">
                                
                                <div class="calc-tool-card">
                                    <div class="calc-card-input-area">
                                        <div class="calc-row-input">
                                            <label>Current Hammer:</label>
                                            <input type="text" id="calc-hammers" value="50,000" class="calc-input-chunky" 
                                                   onfocus="unformatInput(this)" 
                                                   onblur="formatInput(this); updateCalculator()" 
                                                   oninput="cleanInput(this); updateCalculator()">
                                        </div>
                                    </div>
                                    <div id="calc-res-1" class="calc-result-box"></div>
                                </div>

                                <div class="calc-tool-card">
                                    <div class="calc-card-input-area">
                                        <div class="calc-row-input">
                                            <label>Target Gold:</label>
                                            <input type="text" id="calc-target" value="10,000,000" class="calc-input-chunky" 
                                                   onfocus="unformatInput(this)" 
                                                   onblur="formatInput(this); updateCalculator()" 
                                                   oninput="cleanInput(this); updateCalculator()">
                                        </div>
                                    </div>
                                    <div id="calc-res-2" class="calc-result-box"></div>
                                </div>

                                <div class="calc-tool-card">
                                    <div class="calc-card-input-area">
                                        <div class="calc-row-input">
                                            <label>Current Forge Lv:</label>
                                            <select id="calc-forge-lv" class="calc-select-chunky" onchange="updateCalculator()"></select>
                                        </div>
                                        <div class="calc-row-input">
                                            <label>Upgrade Start:</label>
                                            <input type="datetime-local" id="calc-start-date" class="calc-date-chunky desktop-only" onchange="updateCalculator(); syncCalcMobileDate(this.value)">

                                            <div id="calc-mobile-custom-date" class="mobile-only custom-date-group">
                                                <select id="cm-month" class="cd-select cd-month" onchange="updateCalcFromDropdowns()"></select>
                                                <select id="cm-day" class="cd-select cd-day" onchange="updateCalcFromDropdowns()"></select>
                                                <select id="cm-hour" class="cd-select cd-time" onchange="updateCalcFromDropdowns()"></select>
                                                <span class="cd-sep">:</span>
                                                <select id="cm-min" class="cd-select cd-time" onchange="updateCalcFromDropdowns()"></select>
                                            </div>
                                        </div>
                                    </div>
                                    <div id="calc-res-5" class="calc-result-box"></div>
                                </div>

                            </div>
                        </div>

<div id="panel-daily" class="sidebar-panel" style="display:none;">
    <div class="log-container">
        
        <!-- CARD 1: THIEF DUNGEON CALCULATOR -->
        <div class="daily-card">
            <div class="daily-header-strip" style="background-color: #9b59b6;"> <!-- Purple for Thief -->
                <span class="daily-header-title">THIEF DUNGEON</span>
            </div>
            
            <div class="daily-input-row">
                <label class="daily-label">Highest World:</label>
                <input type="number" id="calc-world" value="1" class="daily-input" onchange="updateDaily()">
            </div>
            
            <div class="daily-input-row">
                <label class="daily-label">Highest Stage:</label>
                <input type="number" id="calc-stage" value="1" class="daily-input" onchange="updateDaily()">
            </div>

            <!-- RESULT AREA 1 -->
            <div class="daily-result-box" id="calc-res-3">
                <!-- Content injected by js/daily.js -->
            </div>
        </div>

        <!-- CARD 2: DAILY SUMMARY -->
        <div class="daily-card">
            <div class="daily-header-strip" style="background-color: #2ecc71;"> <!-- Green for Total -->
                <span class="daily-header-title">TOTAL DAILY INCOME</span>
            </div>

            <!-- RESULT AREA 2 -->
            <div class="daily-result-box" id="calc-res-4">
                 <!-- Content injected by js/daily.js -->
            </div>
            
            <div style="text-align:center; font-family:'Fredoka',sans-serif; font-size:0.8rem; color:#95a5a6; margin-top:5px;">
                *Calculations include 4x Thief Runs + Passive Regen
            </div>
        </div>

        <div class="physical-spacer" style="height: 60px;"></div>
    </div>
</div>

<div id="panel-egg" class="sidebar-panel" style="display:none;">
    <div class="log-container">
        
        <div class="config-card">
            <div class="date-row-styled">
                <label class="drs-label">Start:</label>
                <input type="datetime-local" id="egg-date-desktop" class="drs-input desktop-only" lang="en-GB" onchange="renderEggLog()">
                
                <div id="egg-mobile-custom-date" class="mobile-only custom-date-group">
                    <select id="em-month" class="cd-select cd-month" onchange="updateFromDropdowns('egg')"></select>
                    <select id="em-day" class="cd-select cd-day" onchange="updateFromDropdowns('egg')"></select>
                    <select id="em-hour" class="cd-select cd-time" onchange="updateFromDropdowns('egg')"></select>
                    <span class="cd-sep">:</span>
                    <select id="em-min" class="cd-select cd-time" onchange="updateFromDropdowns('egg')"></select>
                </div>
            </div>
            <div class="egg-prompt-text">Choose which egg to hatch next:</div>           
            <div class="egg-selector" id="egg-selector-box">
                <button class="egg-btn" onclick="addEggToQueue('common')"><img src="icons/EggCommon.png"></button>
                <button class="egg-btn" onclick="addEggToQueue('rare')"><img src="icons/EggRare.png"></button>
                <button class="egg-btn" onclick="addEggToQueue('epic')"><img src="icons/EggEpic.png"></button>
                <button class="egg-btn" onclick="addEggToQueue('legendary')"><img src="icons/EggLegendary.png"></button>
                <button class="egg-btn" onclick="addEggToQueue('ultimate')"><img src="icons/EggUltimate.png"></button>
                <button class="egg-btn" onclick="addEggToQueue('mythic')"><img src="icons/EggMythic.png"></button>
            </div>
        </div>
        
        <!-- 2. Summary moved here (Right below selector) -->
        <div id="egg-total-summary"></div>

        <div class="egg-log-container" id="egg-log-list"></div>
        <!-- Summary removed from here -->

        <div class="physical-spacer" style="height: 60px;"></div>
    </div>
</div>

                    </div>
                </div>

                <div id="capsule-logs" class="control-capsule bottom-capsule desktop-only" style="display:flex;">
                    <button class="btn-reset-text" onclick="clearPlan()" title="Clear Plan"></button>
                    <button id="btn-undo-log" onclick="undo()" disabled title="Undo"></button>
                    <button id="btn-redo-log" onclick="redo()" disabled title="Redo"></button>
                </div>

                <div id="capsule-egg" class="control-capsule bottom-capsule desktop-only" style="display:none;">
                    <button class="btn-reset-text" onclick="clearEggPlan()" title="Clear Egg Plan"></button>
                    <button id="btn-undo-egg" onclick="undoEgg()" disabled title="Undo"></button>
                    <button id="btn-redo-egg" onclick="redoEgg()" disabled title="Redo"></button>
                </div>
            </div>
        </div>
    </div>

    <div id="mobile-floating-controls" class="mobile-only">
        <div class="control-capsule">
            <button class="tn-action-btn reset-neutral" onclick="resetCurrentTree()"></button>
            <button class="tn-action-btn" id="btn-undo-mobile-new" onclick="undo()" disabled></button>
            <button class="tn-action-btn" id="btn-redo-mobile-new" onclick="redo()" disabled></button>
        </div>
    </div>
    <div id="float-tree" class="mobile-floating-container mobile-only">
        <div class="control-capsule">
            <button class="tn-action-btn reset-neutral" onclick="resetCurrentTree()"></button>
            <button class="tn-action-btn" id="btn-undo-mobile-tree" onclick="undo()" disabled></button>
            <button class="tn-action-btn" id="btn-redo-mobile-tree" onclick="redo()" disabled></button>
        </div>
    </div>

    <div id="float-logs" class="mobile-floating-container mobile-only">
        <div class="control-capsule">
            <button class="tn-action-btn reset-neutral" onclick="clearPlan()"></button>
            <button class="tn-action-btn" id="btn-undo-mobile-log" onclick="undo()" disabled></button>
            <button class="tn-action-btn" id="btn-redo-mobile-log" onclick="redo()" disabled></button>
        </div>
    </div>

    <div id="float-egg" class="mobile-floating-container mobile-only">
        <div class="control-capsule">
            <button class="tn-action-btn reset-neutral" onclick="clearEggPlan()"></button>
            <button class="tn-action-btn" id="btn-undo-mobile-egg" onclick="undoEgg()" disabled></button>
            <button class="tn-action-btn" id="btn-redo-mobile-egg" onclick="redoEgg()" disabled></button>
        </div>
    </div>

<div id="mobile-more-view" class="more-view-container mobile-only">
        <div class="more-top-bar">
            <div class="mtb-actions">
                <button class="sys-btn-mobile" onclick="downloadData()">
                    <img src="icons/icon_save.png"> <span>Save</span>
                </button>
                <button class="sys-btn-mobile" onclick="document.getElementById('file-upload').click()">
                    <img src="icons/icon_load.png"> <span>Load</span>
                </button>
                <button class="sys-btn-mobile" onclick="toggleHelp()">
                    <img src="icons/icon_help.png"> <span>Help</span>
                </button>
            </div>
        </div>

        <div class="mobile-dashboard-wrapper">
            
            <div class="floating-header-container mobile-floating-header">
                <div class="fhc-circle">
                    <span>
                        <img src="icons/Doraemon.png" alt="Icon" style="width: 110% !important; height: 110% !important; object-fit: contain;">
                    </span>
                </div>
                <div class="fhc-pill" style="justify-content: center;">
                    <span style="white-space: nowrap;">TOOLBOX</span>
                </div>
            </div>

            <div class="tools-group-box mobile-tools-tray">
                <button class="dash-btn" onclick="setSidebarPanel('calc'); switchMobileView('calc')">
                    <img src="icons/anvil.png" class="dash-icon"> Forge Calc
                </button>
                <button class="dash-btn" onclick="setSidebarPanel('daily'); switchMobileView('daily')">
                    <img src="icons/icon_daily.png" class="dash-icon"> Daily Gain
                </button>
                <button class="dash-btn" onclick="setSidebarPanel('egg'); switchMobileView('egg')">
                    <img src="icons/icon_eggplan.png" class="dash-icon"> Egg Planner
                </button>
            </div>
            
        </div>
    </div>

<nav class="bottom-nav mobile-only">
        <button class="b-nav-item active" data-target="more" onclick="switchMobileView('more')">
            <img src="icons/icon_more.png" class="b-icon">
            <span class="b-label">Home</span>
        </button>
        <button class="b-nav-item" data-target="tree" onclick="switchMobileView('tree')">
            <img src="icons/icon_techtree.png" class="b-icon">
            <span class="b-label">Tech Tree</span>
        </button>
        <button class="b-nav-item" data-target="logs" onclick="switchMobileView('logs')">
            <img src="icons/icon_timeline.png" class="b-icon">
            <span class="b-label">Schedule</span>
        </button>
        <button class="b-nav-item" data-target="stats" onclick="switchMobileView('stats')">
            <img src="icons/icon_stats.png" class="b-icon">
            <span class="b-label">Stats</span>
        </button>
    </nav>

    <div id="tableModal" class="modal"><div class="modal-content"></div></div>
    <div id="helpModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleHelp()">&times;</span>
            <h2>How to Use</h2>
            <div style="display: flex; justify-content: center; margin-top: 20px;">
                <img src="icons/AbyssDoraemon.png" alt="Profile" style="max-width: 280px; height: auto;">
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/tech-planner.js"></script>
    <script src="js/tools.js"></script>
    <script src="js/main.js"></script>
    <script src="js/daily.js"></script>
</body>
</html>
